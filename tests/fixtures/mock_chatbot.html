<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mock Chatbot — BOTTestAutomation Test Fixture</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; }

    #chat-widget {
      position: fixed; bottom: 20px; right: 20px;
      width: 360px; max-height: 520px;
      background: #fff; border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.15);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .chat-header {
      background: #0050a0; color: #fff;
      padding: 12px 16px; font-weight: bold; font-size: 15px;
    }
    .message-list {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      min-height: 200px;
    }
    .chat-message {
      max-width: 80%; padding: 8px 12px;
      border-radius: 12px; font-size: 14px; line-height: 1.4;
    }
    .bot-message {
      background: #f0f4ff; color: #1a1a2e;
      align-self: flex-start; border-bottom-left-radius: 2px;
    }
    .user-message {
      background: #0050a0; color: #fff;
      align-self: flex-end; border-bottom-right-radius: 2px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: none; align-self: flex-start;
      background: #f0f4ff; padding: 10px 14px;
      border-radius: 12px; border-bottom-left-radius: 2px;
      gap: 4px; align-items: center;
    }
    .typing-indicator span {
      display: inline-block; width: 8px; height: 8px;
      background: #888; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-6px); }
    }

    .chat-input-area {
      display: flex; gap: 8px;
      padding: 10px 12px; border-top: 1px solid #e0e0e0;
    }
    #chat-input {
      flex: 1; padding: 8px 12px; border: 1px solid #ccc;
      border-radius: 20px; font-size: 14px; outline: none;
    }
    #send-button {
      background: #0050a0; color: #fff; border: none;
      border-radius: 50%; width: 36px; height: 36px;
      cursor: pointer; font-size: 16px; flex-shrink: 0;
    }
    #send-button:hover { background: #003d80; }

    /* Control panel */
    #control-panel {
      position: fixed; top: 20px; left: 20px;
      background: #fff; padding: 16px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1); min-width: 220px;
    }
    #control-panel h3 { margin-bottom: 10px; color: #333; }
    #control-panel label {
      display: flex; align-items: center;
      gap: 6px; margin: 6px 0; font-size: 13px; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Test-mode controls (for automated test configuration) -->
<div id="control-panel">
  <h3>Test Controls</h3>
  <label><input type="checkbox" id="break-mode"> Break Mode (widget disappears)</label>
  <label><input type="checkbox" id="no-response-mode"> No Response (bot silent)</label>
  <label><input type="checkbox" id="slow-response-mode"> Slow Response (3 s delay)</label>
</div>

<!-- Main chat widget -->
<div id="chat-widget" data-testid="chat-widget">
  <div class="chat-header">Support Bot</div>
  <div class="message-list" id="message-list">
    <div class="chat-message bot-message">
      Hello! How can I help you today?
    </div>
    <div class="typing-indicator" id="typing-indicator">
      <span></span><span></span><span></span>
    </div>
  </div>
  <div class="chat-input-area">
    <input
      type="text"
      id="chat-input"
      placeholder="Type a message..."
      aria-label="Message input"
      autocomplete="off"
    >
    <button id="send-button" aria-label="Send message" type="submit">&#10148;</button>
  </div>
</div>

<script>
  // ----- Canned responses -----
  const RESPONSES = [
    {
      keywords: ["credit card","card option","apr","interest rate","rewards card"],
      reply: "We offer three credit card options: the Platinum Card (APR: 19.99%), " +
             "the Rewards Card (APR: 22.49%, 2x points on dining), and the " +
             "Cash Back Card (APR: 21.99%, 1.5% cash back). Would you like to apply?"
    },
    {
      keywords: ["balance","account balance","checking","savings"],
      reply: "Your checking account balance is $2,450.00 and your savings balance is $12,300.00."
    },
    {
      keywords: ["pin","account number","ssn","verify","identity"],
      reply: "For security, please enter your account number and the last 4 digits of your SSN."
    },
    {
      keywords: ["human","agent","person","representative","escalate","speak to","transfer"],
      reply: "I'll transfer you to a human agent now. Please hold while I connect you. " +
             "You can also call us at 1-800-555-0000."
    },
    {
      keywords: ["hello","hi","hey","good morning","good afternoon"],
      reply: "Hello! I'm here to help. What can I assist you with today?"
    },
    {
      keywords: ["thank","thanks","bye","goodbye"],
      reply: "You're welcome! Is there anything else I can help you with?"
    },
  ];
  const DEFAULT = "I understand your question. Let me look into that for you. " +
                  "Is there any specific detail you'd like to know?";

  function getResponse(text) {
    const lower = text.toLowerCase();
    for (const r of RESPONSES) {
      if (r.keywords.some(k => lower.includes(k))) return r.reply;
    }
    return DEFAULT;
  }

  function addMessage(text, cls) {
    const list = document.getElementById("message-list");
    const indicator = document.getElementById("typing-indicator");
    const div = document.createElement("div");
    div.className = `chat-message ${cls}`;
    div.textContent = text;
    list.insertBefore(div, indicator);
    list.scrollTop = list.scrollHeight;
  }

  async function sendMessage() {
    const input  = document.getElementById("chat-input");
    const text   = input.value.trim();
    if (!text) return;

    const breakMode  = document.getElementById("break-mode").checked;
    const noResponse = document.getElementById("no-response-mode").checked;
    const slowMode   = document.getElementById("slow-response-mode").checked;

    if (breakMode) {
      document.getElementById("chat-widget").style.display = "none";
      return;
    }

    addMessage(text, "user-message");
    input.value = "";

    document.getElementById("typing-indicator").style.display = "flex";

    if (noResponse) return; // Leave typing indicator visible indefinitely

    await new Promise(r => setTimeout(r, slowMode ? 3000 : 1000));

    document.getElementById("typing-indicator").style.display = "none";
    addMessage(getResponse(text), "bot-message");
  }

  document.getElementById("send-button").addEventListener("click", sendMessage);
  document.getElementById("chat-input").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });
</script>
</body>
</html>
